name: Sync Tarantool schemas

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch and validate only — do not commit, push, or open a PR."
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-tarantool-schemas
  cancel-in-progress: false

env:
  GO_VERSION: 1.25

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: guard against existing open PR
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          count=$(gh pr list \
            --state open \
            --head automation/sync-tarantool-schemas \
            --json number \
            --jq length)
          if [ "$count" -gt 0 ]; then
            echo "open PR exists; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: setup Go
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: reset automation branch from origin/master
        if: steps.guard.outputs.skip != 'true'
        run: git checkout -B automation/sync-tarantool-schemas origin/master

      - name: run schemasync
        id: schemasync
        if: steps.guard.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          args=()
          if [ "${DRY_RUN:-false}" = "true" ]; then
            args+=("--dry-run")
            echo "::notice::dry-run enabled; no PR will be opened"
          fi
          go run ./internal/tools/schemasync "${args[@]}" | tee schemasync.out
          added=$(grep '^added=' schemasync.out | cut -d= -f2-)
          echo "added=${added}" >> "$GITHUB_OUTPUT"

      - name: check for changes
        id: changes
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain tarantool/schemas/)" ]; then
            echo "no new schemas"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: validate embedded schemas
        if: steps.guard.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        run: go test ./tarantool/... -count=1

      - name: configure git identity
        if: steps.guard.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: commit new schemas
        if: steps.guard.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        env:
          ADDED: ${{ steps.schemasync.outputs.added }}
        run: |
          set -euo pipefail
          git add tarantool/schemas
          git commit -m "tarantool: embed JSON Schemas for ${ADDED}"

      - name: push automation branch
        if: steps.guard.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        run: git push --force-with-lease origin automation/sync-tarantool-schemas

      - name: open pull request
        if: steps.guard.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ADDED: ${{ steps.schemasync.outputs.added }}
        run: |
          set -euo pipefail
          {
            echo "Automated sync of Tarantool JSON Schemas."
            echo ""
            echo "## Added versions"
            echo ""
            IFS=',' read -ra versions <<< "${ADDED}"
            for v in "${versions[@]}"; do
              v_trimmed=$(echo "$v" | xargs)
              [ -z "$v_trimmed" ] && continue
              echo "- [ ] \`${v_trimmed}\` — https://download.tarantool.org/tarantool/schema/config.schema.${v_trimmed}.json"
            done
            echo ""
            echo "Generated by \`.github/workflows/sync-tarantool-schemas.yaml\`."
          } > pr-body.md
          gh pr create \
            --base master \
            --head automation/sync-tarantool-schemas \
            --title "tarantool: embed JSON Schemas for ${ADDED}" \
            --body-file pr-body.md
